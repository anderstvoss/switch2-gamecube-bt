name: Gitleaks (full history)

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

concurrency:
  group: gitleaks-history-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks (full history)
    # Gated on public visibility along with the other remote-CI jobs;
    # while private, scripts/deep-scan.sh covers the same surface
    # locally. Auto-activates on public flip.
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      # Bring every branch and tag into the local clone so the
      # subsequent `--log-opts=--all` scan reaches them. Without this,
      # `actions/checkout` only materialises the triggering ref's
      # history.
      - name: Fetch all refs
        run: |
          git fetch --no-tags --prune origin \
            '+refs/heads/*:refs/remotes/origin/*' \
            '+refs/tags/*:refs/tags/*'

      # Main-history scan via the official action (SHA-pinned install).
      - name: Gitleaks (main history)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Deep scan: same gitleaks binary now on PATH, called directly
      # with `--log-opts=--all` to walk every commit reachable from any
      # branch or tag. Closes the gap where un-merged side branches
      # could carry secrets that the main-only scan would miss.
      - name: Gitleaks (all refs)
        run: gitleaks detect --no-banner --log-opts='--all'
